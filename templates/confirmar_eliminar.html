{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">⚠️ Confirmar Eliminación</h4>
            </div>
            <div class="card-body text-center py-4">
                <p class="fs-5">¿Estás seguro de que deseas eliminar permanentemente a este contacto?</p>
                <h3 class="text-dark my-3"><strong>{{ contacto.nombre_completo }}</strong></h3>
                <p class="text-muted small">Esta acción no se puede deshacer de forma local.</p>
                
                <form action="/contactos/{{ contacto.id_contacto }}/eliminar/" method="POST" class="mt-4">
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <button type="submit" class="btn btn-danger px-4">Sí, Eliminar</button>
                        <a href="/contactos/" class="btn btn-outline-secondary px-4">Cancelar y Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
